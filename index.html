<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Memory Game + Daily Streak</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            padding: 20px;
        }

        /* Огонёк в стиле TikTok */
        .streak-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 25px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.5s ease;
        }

        .fire-icon {
            font-size: 1.5rem;
            filter: grayscale(1) opacity(0.5); /* По умолчанию потухший */
            transition: all 0.5s;
        }

        .streak-active .fire-icon {
            filter: grayscale(0) opacity(1);
            text-shadow: 0 0 15px orange, 0 0 25px red;
            animation: pulse-fire 0.8s infinite alternate;
        }

        @keyframes pulse-fire {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .streak-count { font-weight: bold; font-size: 1.2rem; }

        /* Игровое поле */
        .board {
            display: grid;
            gap: 10px;
            max-width: 500px;
            width: 100%;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { transform: rotateY(180deg); opacity: 0.7; cursor: default; }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .card-front { background: #444; }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        .card-back { transform: rotateY(180deg); background: #222; }
        .card-back img { width: 100%; height: 100%; object-fit: cover; }

        /* Интерфейс */
        .stats { display: flex; gap: 20px; margin-bottom: 20px; opacity: 0.8; }
        .difficulty { display: flex; gap: 10px; margin-bottom: 20px; }
        .difficulty button {
            padding: 8px 15px; border-radius: 15px; border: 1px solid #fff;
            background: transparent; color: #fff; cursor: pointer;
        }
        .difficulty button.active { background: #fff; color: #000; }

        .btn {
            padding: 12px 30px; border-radius: 25px; border: none;
            background: linear-gradient(45deg, #ff0050, #00f2ea); /* Цвета TikTok */
            color: #fff; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        /* Скример */
        #screamer {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background: #000; z-index: 9999;
        }
        #screamer img { width: 100%; height: 100%; object-fit: contain; }

        /* Рейтинг */
        .leaderboard {
            margin-top: 30px; background: rgba(0,0,0,0.4);
            padding: 15px; border-radius: 15px; width: 100%; max-width: 300px;
        }
        .score-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #333; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            align-items: center; justify-content: center; z-index: 500;
        }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a1a; padding: 30px; border-radius: 20px; text-align: center; }
        .modal input { width: 100%; padding: 10px; margin: 15px 0; border-radius: 8px; border: none; }
    </style>
</head>
<body>

    <div id="screamer">
        <img src="Images/paskal.png" alt="!">
    </div>

    <h1>🧠 Memory Game</h1>

    <div class="streak-container" id="streak-container">
        <span class="fire-icon">🔥</span>
        <span class="streak-count">Серия: <span id="streak-num">0</span> дн.</span>
    </div>

    <div class="difficulty">
        <button onclick="changeDiff('easy', 4, 3, 6)" id="d-easy">4×3</button>
        <button onclick="changeDiff('medium', 4, 4, 8)" id="d-medium" class="active">4×4</button>
        <button onclick="changeDiff('hard', 6, 4, 12)" id="d-hard">6×4</button>
    </div>

    <div class="stats">
        <span>⏱ <b id="timer">0:00</b></span>
        <span>🔄 Ходы: <b id="moves">0</b></span>
    </div>

    <div class="board" id="board"></div>

    <button class="btn" onclick="handleRestartBtn()">🔄 ЗАНОВО</button>

    <div class="leaderboard">
        <h4 style="text-align: center; margin-bottom: 10px;">🏆 Рекорды</h4>
        <div id="leaderboard-list"></div>
    </div>

    <div class="modal-overlay" id="win-modal">
        <div class="modal">
            <h2>Победа! 🎉</h2>
            <p>Вы отметились за сегодня!</p>
            <input type="text" id="player-name" placeholder="Ваше имя" maxlength="10">
            <button class="btn" onclick="saveRecord()">Сохранить результат</button>
        </div>
    </div>

    <script>
        const cardShirt = 'Images/card1.jpg';
        const gameImages = [];
        for (let i = 2; i <= 13; i++) gameImages.push(`Images/card${i}.jpg`);

        let gridX = 4, gridY = 4, pairsCount = 8, currentDiff = 'medium';
        let cards = [], flipped = [], matched = 0, moves = 0, seconds = 0;
        let timer = null, lock = false, restartClicks = 0;

        // --- Логика Daily Streak ---
        function checkStreak() {
            const now = new Date();
            const todayStr = now.toDateString();
            const lastDate = localStorage.getItem('lastPlayedDate');
            let streak = parseInt(localStorage.getItem('userStreak')) || 0;

            if (lastDate) {
                const last = new Date(lastDate);
                const diffTime = now - last;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays === 1) {
                    // Зашли на следующий день - серия сохраняется
                } else if (diffDays > 1) {
                    // Пропустили день - сброс
                    streak = 0;
                }
            }

            localStorage.setItem('userStreak', streak);
            document.getElementById('streak-num').innerText = streak;

            // Если сегодня уже отмечались (выигрывали)
            if (lastDate === todayStr && streak > 0) {
                document.getElementById('streak-container').classList.add('streak-active');
            }
        }

        function updateStreakOnWin() {
            const now = new Date();
            const todayStr = now.toDateString();
            const lastDate = localStorage.getItem('lastPlayedDate');
            let streak = parseInt(localStorage.getItem('userStreak')) || 0;

            if (lastDate !== todayStr) {
                streak++; // Увеличиваем, если сегодня еще не отмечались
                localStorage.setItem('userStreak', streak);
                localStorage.setItem('lastPlayedDate', todayStr);
            }
            
            document.getElementById('streak-num').innerText = streak;
            document.getElementById('streak-container').classList.add('streak-active');
        }

        // --- Логика игры ---
        function initBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${gridX}, 1fr)`;

            const pool = shuffle([...gameImages]).slice(0, pairsCount);
            const deck = shuffle([...pool, ...pool]);

            deck.forEach(img => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.img = img;
                card.innerHTML = `
                    <div class="card-face card-front"><img src="${cardShirt}"></div>
                    <div class="card-face card-back"><img src="${img}"></div>
                `;
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
            updateLeaderboardDisplay();
        }

        function flipCard(card) {
            if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            restartClicks = 0; // Сброс счетчика скримера при игре
            
            if (!timer) startTimer();

            card.classList.add('flipped');
            flipped.push(card);

            if (flipped.length === 2) {
                moves++;
                document.getElementById('moves').innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flipped;
            if (c1.dataset.img === c2.dataset.img) {
                c1.classList.add('matched');
                c2.classList.add('matched');
                matched++;
                flipped = [];
                if (matched === pairsCount) endGame();
            } else {
                lock = true;
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flipped = [];
                    lock = false;
                }, 800);
            }
        }

        function endGame() {
            clearInterval(timer);
            updateStreakOnWin();
            document.getElementById('win-modal').classList.add('active');
        }

        function saveRecord() {
            const name = document.getElementById('player-name').value || "Аноним";
            const records = JSON.parse(localStorage.getItem('records_' + currentDiff)) || [];
            records.push({ name, time: seconds });
            records.sort((a, b) => a.time - b.time);
            localStorage.setItem('records_' + currentDiff, JSON.stringify(records.slice(0, 5)));
            
            document.getElementById('win-modal').classList.remove('active');
            restartGame();
        }

        function updateLeaderboardDisplay() {
            const list = document.getElementById('leaderboard-list');
            const records = JSON.parse(localStorage.getItem('records_' + currentDiff)) || [];
            list.innerHTML = records.map((r, i) => `
                <div class="score-item">
                    <span>${i+1}. ${r.name}</span>
                    <b>${Math.floor(r.time/60)}:${(r.time%60).toString().padStart(2,'0')}</b>
                </div>
            `).join('') || '<p style="font-size:0.8rem; opacity:0.5; text-align:center;">Нет рекордов</p>';
        }

        // --- Вспомогательные функции ---
        function startTimer() {
            seconds = 0;
            timer = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = `${Math.floor(seconds/60)}:${(seconds%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        function restartGame() {
            clearInterval(timer);
            timer = null;
            seconds = 0; moves = 0; matched = 0; flipped = []; lock = false;
            document.getElementById('timer').innerText = '0:00';
            document.getElementById('moves').innerText = '0';
            initBoard();
        }

        function handleRestartBtn() {
            restartClicks++;
            if (restartClicks >= 3) {
                const s = document.getElementById('screamer');
                s.style.display = 'block';
                setTimeout(() => s.style.display = 'none', 3000);
                restartClicks = 0;
            }
            restartGame();
        }

        function changeDiff(d, x, y, p) {
            currentDiff = d; gridX = x; gridY = y; pairsCount = p;
            document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
            document.getElementById('d-' + d).classList.add('active');
            restartGame();
        }

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // Запуск
        checkStreak();
        initBoard();
    </script>
</body>
</html>
