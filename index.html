<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Memory Game: Daily Streak Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            padding: 20px;
        }

        /* Огонёк Daily Streak */
        .streak-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .fire-icon {
            font-size: 1.6rem;
            filter: grayscale(1) opacity(0.4);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .streak-active .fire-icon {
            filter: grayscale(0) opacity(1);
            text-shadow: 0 0 15px orange, 0 0 30px red;
            animation: burn 0.8s infinite alternate;
        }

        @keyframes burn {
            from { transform: scale(1); }
            to { transform: scale(1.2) rotate(5deg); }
        }

        /* Игровое поле */
        .board {
            display: grid;
            gap: 12px;
            max-width: 550px;
            width: 100%;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped { transform: rotateY(180deg); }

        /* ИСПРАВЛЕННАЯ АНИМАЦИЯ СОВПАДЕНИЯ */
        .card.matched {
            transform: rotateY(180deg);
            cursor: default;
            animation: matchPulse 0.5s ease-out;
        }

        .card.matched .card-back {
            border: 3px solid #2ecc71; /* Яркая зеленая рамка */
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }

        @keyframes matchPulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-front { background: #333; }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        .card-back { transform: rotateY(180deg); background: #222; }
        .card-back img { width: 100%; height: 100%; object-fit: cover; }

        /* Интерфейс */
        .difficulty { display: flex; gap: 10px; margin-bottom: 20px; }
        .difficulty button {
            padding: 8px 16px; border-radius: 20px; border: 1px solid #fff;
            background: transparent; color: #fff; cursor: pointer; transition: 0.3s;
        }
        .difficulty button.active { background: #fff; color: #000; }

        .btn {
            padding: 12px 35px; border-radius: 30px; border: none;
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            color: #fff; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        .stats { margin-bottom: 15px; font-size: 1.1rem; display: flex; gap: 20px; }

        /* Скример */
        #screamer {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background: #000; z-index: 9999;
        }
        #screamer img { width: 100%; height: 100%; object-fit: contain; }

        /* Рейтинг */
        .leaderboard {
            margin-top: 30px; background: rgba(0,0,0,0.3);
            padding: 20px; border-radius: 20px; width: 100%; max-width: 350px;
        }
        .score-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #444; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a1a; padding: 40px; border-radius: 25px; text-align: center; border: 1px solid #333; }
        .modal input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: none; outline: none; }
    </style>
</head>
<body>

    <div id="screamer">
        <img src="Images/paskal.png" alt="!">
    </div>

    <h1>🧠 Memory Game</h1>

    <div class="streak-container" id="streak-box">
        <span class="fire-icon">🔥</span>
        <span class="streak-count">Серия: <span id="streak-num">0</span> дн.</span>
    </div>

    <div class="difficulty">
        <button onclick="changeDifficulty('easy', 4, 3, 6)" id="d-easy">4×3</button>
        <button onclick="changeDifficulty('medium', 4, 4, 8)" id="d-medium" class="active">4×4</button>
        <button onclick="changeDifficulty('hard', 6, 4, 12)" id="d-hard">6×4</button>
    </div>

    <div class="stats">
        <span>⏱ <b id="timer">0:00</b></span>
        <span>🔄 Ходы: <b id="moves">0</b></span>
    </div>

    <div id="board" class="board"></div>

    <button class="btn" onclick="handleRestartBtn()">🔄 ЗАНОГО</button>

    <div class="leaderboard">
        <h3 style="text-align: center; margin-bottom: 15px;">🏆 Топ-5</h3>
        <div id="leaderboard-list"></div>
    </div>

    <div class="modal-overlay" id="win-modal">
        <div class="modal">
            <h2>ПОБЕДА! 🎉</h2>
            <p id="win-text"></p>
            <input type="text" id="player-name" placeholder="Твоё имя" maxlength="12">
            <button class="btn" onclick="saveResult()">СОХРАНИТЬ</button>
        </div>
    </div>

    <script>
        const cardShirt = 'Images/card1.jpg';
        const gameImages = Array.from({length: 12}, (_, i) => `Images/card${i + 2}.jpg`);

        let gridX = 4, gridY = 4, pairsGoal = 8, diffKey = 'medium';
        let flipped = [], matched = 0, moves = 0, seconds = 0, timerIdx = null;
        let isLocked = false, restartCount = 0;

        // --- Daily Streak Logic ---
        function updateStreakSystem() {
            const now = new Date();
            const today = now.toDateString();
            const lastDate = localStorage.getItem('lastWinDate');
            let streak = parseInt(localStorage.getItem('streakCounter')) || 0;

            if (lastDate) {
                const last = new Date(lastDate);
                const diffDays = Math.floor((now - last) / (1000 * 60 * 60 * 24));

                if (diffDays > 1) streak = 0; // Сброс если пропущен день
            }

            localStorage.setItem('streakCounter', streak);
            document.getElementById('streak-num').innerText = streak;
            if (lastDate === today && streak > 0) {
                document.getElementById('streak-box').classList.add('streak-active');
            }
        }

        function markWinToday() {
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem('lastWinDate');
            let streak = parseInt(localStorage.getItem('streakCounter')) || 0;

            if (lastDate !== today) {
                streak++;
                localStorage.setItem('streakCounter', streak);
                localStorage.setItem('lastWinDate', today);
            }
            updateStreakSystem();
        }

        // --- Game Core ---
        function initGame() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${gridX}, 1fr)`;

            const pool = shuffle([...gameImages]).slice(0, pairsGoal);
            const deck = shuffle([...pool, ...pool]);

            deck.forEach(img => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.img = img;
                card.innerHTML = `
                    <div class="card-face card-front"><img src="${cardShirt}"></div>
                    <div class="card-face card-back"><img src="${img}"></div>
                `;
                card.onclick = () => flip(card);
                board.appendChild(card);
            });
            renderLeaderboard();
        }

        function flip(card) {
            if (isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            restartCount = 0; 
            if (!timerIdx) startTimer();

            card.classList.add('flipped');
            flipped.push(card);

            if (flipped.length === 2) {
                moves++;
                document.getElementById('moves').innerText = moves;
                check();
            }
        }

        function check() {
            const [c1, c2] = flipped;
            if (c1.dataset.img === c2.dataset.img) {
                // ИСПРАВЛЕНО: Карты остаются открытыми и пульсируют
                c1.classList.replace('flipped', 'matched');
                c2.classList.replace('flipped', 'matched');
                matched++;
                flipped = [];
                if (matched === pairsGoal) finish();
            } else {
                isLocked = true;
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flipped = [];
                    isLocked = false;
                }, 800);
            }
        }

        function finish() {
            clearInterval(timerIdx);
            markWinToday();
            document.getElementById('win-text').innerText = `Время: ${document.getElementById('timer').innerText} | Ходов: ${moves}`;
            document.getElementById('win-modal').classList.add('active');
        }

        function saveResult() {
            const name = document.getElementById('player-name').value || "Игрок";
            const scores = JSON.parse(localStorage.getItem('scores_' + diffKey)) || [];
            scores.push({ name, time: seconds });
            scores.sort((a, b) => a.time - b.time);
            localStorage.setItem('scores_' + diffKey, JSON.stringify(scores.slice(0, 5)));
            document.getElementById('win-modal').classList.remove('active');
            reset();
        }

        function renderLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const scores = JSON.parse(localStorage.getItem('scores_' + diffKey)) || [];
            list.innerHTML = scores.map((s, i) => `
                <div class="score-row">
                    <span>${i+1}. ${s.name}</span>
                    <b>${Math.floor(s.time/60)}:${(s.time%60).toString().padStart(2,'0')}</b>
                </div>
            `).join('') || '<p style="text-align:center; opacity:0.5">Нет рекордов</p>';
        }

        // --- Helpers ---
        function startTimer() {
            seconds = 0;
            timerIdx = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = `${Math.floor(seconds/60)}:${(seconds%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        function reset() {
            clearInterval(timerIdx);
            timerIdx = null;
            seconds = 0; moves = 0; matched = 0; flipped = []; isLocked = false;
            document.getElementById('timer').innerText = '0:00';
            document.getElementById('moves').innerText = '0';
            initGame();
        }

        function handleRestartBtn() {
            restartCount++;
            if (restartCount >= 3) {
                document.getElementById('screamer').style.display = 'block';
                setTimeout(() => document.getElementById('screamer').style.display = 'none', 3000);
                restartCount = 0;
            }
            reset();
        }

        function changeDifficulty(d, x, y, p) {
            diffKey = d; gridX = x; gridY = y; pairsGoal = p;
            document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
            document.getElementById('d-' + d).classList.add('active');
            reset();
        }

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        updateStreakSystem();
        initGame();
    </script>
</body>
</html>
