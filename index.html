<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Memory Game</title>
    <style>
        /* [Предыдущие стили сохранены] */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .stats span {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 500px;
            width: 100%;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card.matched {
            transform: rotateY(180deg);
            animation: matchPulse 0.6s ease;
        }

        @keyframes matchPulse {
            0%   { transform: rotateY(180deg) scale(1); }
            50%  { transform: rotateY(180deg) scale(1.15); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-front { background: #667eea; }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        .card-back {
            background: #f5576c;
            transform: rotateY(180deg);
        }
        .card-back img { width: 100%; height: 100%; object-fit: cover; }

        .btn {
            margin-top: 25px;
            padding: 12px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Стили для скримера */
        #screamer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
        }

        #screamer img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Сохраняет пропорции paskal.png */
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.active { display: flex; }

        .difficulty { display: flex; gap: 10px; margin-bottom: 20px; }
        .difficulty button {
            padding: 8px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            background: transparent;
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
        }
        .difficulty button.active { background: linear-gradient(145deg, #667eea, #764ba2); }
    </style>
</head>
<body>

    <div id="screamer">
        <img src="Images/paskal.png" alt="SURPRISE">
    </div>

    <h1>🧠 Memory Game</h1>

    <div class="difficulty">
        <button onclick="setDifficulty('easy')" id="btn-easy">4×3</button>
        <button onclick="setDifficulty('medium')" id="btn-medium" class="active">4×4</button>
        <button onclick="setDifficulty('hard')" id="btn-hard">6×4</button>
    </div>

    <div class="stats">
        <span>⏱ <b id="timer">0:00</b></span>
        <span>🔄 Ходы: <b id="moves">0</b></span>
        <span>✅ Пары: <b id="pairs">0</b>/<b id="totalPairs">8</b></span>
    </div>

    <div class="board" id="board"></div>

    <button class="btn" onclick="handleRestart()">🔄 Заново</button>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>🎉 Победа!</h2>
            <p>Время: <b id="finalTime"></b></p>
            <p>Ходов: <b id="finalMoves"></b></p>
            <br>
            <button class="btn" onclick="restartGame(); closeModal();">Играть снова</button>
        </div>
    </div>

    <script>
        const coverImage = 'Images/card1.jpg';
        const gameImages = [];
        for (let i = 2; i <= 13; i++) {
            gameImages.push(`Images/card${i}.jpg`);
        }

        let cols = 4, rows = 4;
        let totalPairs = 8;
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timerInterval = null;
        let seconds = 0;
        let lockBoard = false;
        
        // Счетчик для скримера
        let restartCounter = 0;

        function setDifficulty(level) {
            restartCounter = 0; // Смена сложности сбрасывает счетчик
            document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
            if (level === 'easy')   { cols = 4; rows = 3; totalPairs = 6;  document.getElementById('btn-easy').classList.add('active'); }
            if (level === 'medium') { cols = 4; rows = 4; totalPairs = 8;  document.getElementById('btn-medium').classList.add('active'); }
            if (level === 'hard')   { cols = 6; rows = 4; totalPairs = 12; document.getElementById('btn-hard').classList.add('active'); }
            document.getElementById('totalPairs').textContent = totalPairs;
            restartGame();
        }

        function handleRestart() {
            restartCounter++;
            if (restartCounter === 3) {
                triggerScreamer();
                restartCounter = 0;
            }
            restartGame();
        }

        function triggerScreamer() {
            const sc = document.getElementById('screamer');
            sc.style.display = 'block';
            setTimeout(() => {
                sc.style.display = 'none';
            }, 3000);
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            const chosen = shuffle([...gameImages]).slice(0, totalPairs);
            cards = shuffle([...chosen, ...chosen]);

            cards.forEach((imgPath) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.image = imgPath;
                card.innerHTML = `
                    <div class="card-face card-front"><img src="${coverImage}"></div>
                    <div class="card-face card-back"><img src="${imgPath}"></div>
                `;
                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (lockBoard) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            restartCounter = 0; // Любое игровое действие сбрасывает счетчик "подряд"

            if (seconds === 0) startTimer();
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        /* Остальные функции (checkMatch, shuffle, timer и т.д.) остаются без изменений */
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function checkMatch() {
            const [a, b] = flippedCards;
            if (a.dataset.image === b.dataset.image) {
                a.classList.add('matched'); b.classList.add('matched');
                matchedPairs++;
                document.getElementById('pairs').textContent = matchedPairs;
                flippedCards = [];
                if (matchedPairs === totalPairs) { clearInterval(timerInterval); setTimeout(showWin, 600); }
            } else {
                lockBoard = true;
                setTimeout(() => {
                    a.classList.remove('flipped'); b.classList.remove('flipped');
                    flippedCards = []; lockBoard = false;
                }, 800);
            }
        }

        function startTimer() {
            seconds = 0; clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60); const s = seconds % 60;
                document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function showWin() {
            document.getElementById('finalTime').textContent = document.getElementById('timer').textContent;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function restartGame() {
            clearInterval(timerInterval);
            seconds = 0; moves = 0; matchedPairs = 0; flippedCards = []; lockBoard = false;
            document.getElementById('timer').textContent = '0:00';
            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0';
            createBoard();
        }

        restartGame();
    </script>
</body>
</html>
